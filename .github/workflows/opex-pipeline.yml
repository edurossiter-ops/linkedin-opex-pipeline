name: OpEx LinkedIn Pipeline

on:
  # ── Automatic schedule ──────────────────────────────────────────────
  # Runs Monday, Wednesday and Friday at 09:00 AM BRT (12:00 UTC)
  schedule:
    - cron: "0 07 * * 1,3,5"
    - cron: "0 15 * * 2,4"

  # ── Manual trigger (with dry run option) ────────────────────────────
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run? (true = generate post only, do not publish)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  post:
    name: Generate and Publish OpEx Post
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      # 1. Checkout repository
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # 3. Install dependencies
      - name: Install dependencies
        run: npm install

      # 4. Run the pipeline
      - name: Run OpEx pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: node pipeline.js

      # 5. Upload log as artifact (useful for debugging)
      - name: Upload log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-log-${{ github.run_number }}
          path: logs/
          retention-days: 30

      # 6. Commit topic rotation state
      - name: Commit rotation state
        run: |
          git config user.name "OpEx Bot"
          git config user.email "opex-bot@noreply.github.com"
          git add rotation.json
          git diff --staged --quiet || git commit -m "chore: update topic rotation [skip ci]"
          git push
